<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writer Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet" />
</head>
<body class="bg-gray-100 min-h-screen">

    <div class="max-w-3xl mx-auto px-4 py-12">
        <div class="bg-white p-8 rounded-xl shadow-md border border-gray-200">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold text-gray-800">Compose News Story</h1>
                <a href="/" class="text-sm text-blue-600 hover:underline">← View Live Site</a>
            </div>

            <form action="/admin/publish" method="POST" id="newsForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Headline / Title</label>
                    <input type="text" name="title" required class="w-full border border-gray-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Cover Image URL</label>
                    <input type="url" name="image_url" placeholder="https://example.com/image.jpg" class="w-full border border-gray-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Category</label>
                    <select name="category" class="w-full border border-gray-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="Breaking">Breaking News</option>
                        <option value="Tech">Technology</option>
                        <option value="Business">Business</option>
                        <option value="Culture">Culture & Arts</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Short Summary (For homepage preview)</label>
                    <textarea name="summary" rows="2" required class="w-full border border-gray-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Article Body</label>
                    <input type="hidden" name="content" id="hiddenContent">
                    <div id="editor" class="h-64 bg-white rounded-b-lg"></div>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow transition">
                    Publish Article Live
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
    <script>
        const quill = new Quill('#editor', {
            theme: 'snow',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, false] }],
                    ['bold', 'italic', 'underline', 'blockquote'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    ['clean']
                ]
            }
        });

        document.getElementById('newsForm').onsubmit = function() {
            const contentInput = document.getElementById('hiddenContent');
            contentInput.value = quill.getSemanticHTML();
        };
    </script>
</body>
</html>
